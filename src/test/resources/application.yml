kestra:
  worker:
    controllers:
      type: STATIC
      static:
        endpoints:
          - host: localhost
  repository:
    type: memory
  queue:
    type: memory
  storage:
    type: local
    local:
      base-path: /tmp/unittest
  variables:
    globals:
      mongodbUri: ${mongodb.uri:mongodb://localhost:27017}
